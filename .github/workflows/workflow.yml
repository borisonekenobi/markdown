name: workflow.yml
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Get Version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "version=$(node ./.github/scripts/get-version.js ${{ github.triggering_actor }})" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(node ./.github/scripts/get-version.js)" >> "$GITHUB_OUTPUT"
          fi

  publish-prerelease:
    name: Publish Prerelease Version
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Create Prerelease Version
        run: npm version ${{ needs.get-version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Build Package
        run: npm run build

      - name: Pack Prerelease Version
        run: npm pack

      - uses: actions/upload-artifact@v7
        with:
          name: marka-editor-markdown-${{ needs.get-version.outputs.version }}.tgz
          path: marka-editor-markdown-${{ needs.get-version.outputs.version }}.tgz

  #  TODO: test:
  #    name: Test Package

  publish:
    name: Publish to npm
    needs:
      - publish-prerelease
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Publish
        run: npm publish --tag latest
